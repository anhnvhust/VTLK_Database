<body>

<div class="panel">

<h2>
    Part Database Tool V3
    <span class="status-indicator status-offline" id="statusIndicator"></span>
    <span id="connectionStatus">Offline</span>
</h2>

<div class="button-group">
    <button onclick="loadGoogleSheets()">Refresh from Google Sheets</button>
    <button onclick="syncToGoogle()">Sync to Google Sheets</button>
    <button onclick="saveExcel()">Save Excel</button>
    <button onclick="addRow()">Add Row</button>
    <button onclick="deleteSelected()">Delete Row</button>
    <button onclick="undo()">Undo</button>
    <button onclick="toggleDarkMode()">Dark Mode</button>
</div>

<div class="search-group">
    <select id="field">
        <option value="ALL">All Fields</option>
    </select>
    
    <input type="text" id="keyword" placeholder="Search">
    <button onclick="searchData()">Search</button>
    
    <button onclick="sortAZ()">Sort A→Z</button>
    <button onclick="sortZA()">Sort Z→A</button>
</div>

    <label>Import Excel:</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
    <button onclick="importExcel()">Import</button>
</div>

<input type="text" id="barcodeInput" placeholder="Barcode search">

</div>

<!-- Scanner Modal -->
<div id="scannerModal">
    <div id="scannerBox">
        <h3>📷 Scan Barcode / QR Code</h3>
        <div id="reader"></div>
        <div id="scannerStatus">Đang khởi động camera...</div>
        <button id="btnCloseScanner" onclick="closeScanner()">✕ Đóng</button>
    </div>
</div>

<div class="stats" id="stats">Ready</div>

<div class="table-container">
    <table id="tbl">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>

const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWNdMWsPvOm9TDfU1m3zwWq6_YY2NobeEgsfZ8mfDVZLBRApWDgR9-25ACS7SnUDrmPQ/exec";

let rows = [];
let headers = [];
let undoStack = [];
let darkMode = false;
let currentKeyword = "";
let isEditing = false;
let duplicateMap = {};
let isOnline = false;
let lastSyncTime = null;

// Load data on page load
window.onload = function(){
    loadGoogleSheets();
    setConnectionStatus();
};

// Auto-sync every 60 seconds
setInterval(function(){
    if(!isEditing && rows.length > 0 && isOnline){
        console.log("Auto-syncing...");
        syncToGoogle();
    }
}, 60000);



function setConnectionStatus(){
    const indicator = document.getElementById("statusIndicator");
    const status = document.getElementById("connectionStatus");
    
    if(isOnline){
        indicator.className = "status-indicator status-online";
        status.textContent = "Online - Synced";
    }
    else{
        indicator.className = "status-indicator status-offline";
        status.textContent = "Offline - Using Local Storage";
    }
}



async function loadGoogleSheets(){
    try{
        updateStats("Loading from Google Sheets...");
        
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL);
        
        if(!response.ok){
            throw new Error("HTTP " + response.status);
        }
        
        const data = await response.json();
        
        if(!data || data.length === 0){
            throw new Error("No data received");
        }
        
        headers = data[0];
        rows = [];
        
        for(let i = 1; i < data.length; i++){
            let obj = {};
            headers.forEach((h, index) => {
                obj[h] = data[i][index];
            });
            rows.push(obj);
        }
        
        isOnline = true;
        lastSyncTime = new Date().toLocaleTimeString();
        setConnectionStatus();
        buildFieldList();
        duplicateCheck();
        render(rows);
        updateStats(`Ready - Last sync: ${lastSyncTime} | Records: ${rows.length}`);
        
        // Save to localStorage as backup
        saveLocalData();
    }
    catch(err){
        console.error("Error loading Google Sheets:", err);
        isOnline = false;
        setConnectionStatus();
        
        // Fallback to localStorage
        const saved = localStorage.getItem("PartDB_v3");
        if(saved){
            try{
                const data = JSON.parse(saved);
                if(data && data.headers && data.rows){
                    headers = data.headers;
                    rows = data.rows;
                    buildFieldList();
                    duplicateCheck();
                    render(rows);
                    updateStats(`⚠️ Loaded from Local Storage - Error: ${err.message}`);
                }
            }
            catch(e){
                alert("Error: Cannot load data\n\n" + err.message);
                updateStats("Error loading data");
            }
        }
        else{
            alert("Cannot connect to Google Sheets and no local backup found.\n\nError: " + err.message);
        }
    }
}

function saveLocalData(){
    try{
        const data = {
            headers: headers,
            rows: rows,
            lastSync: new Date().toISOString()
        };
        localStorage.setItem("PartDB_v3", JSON.stringify(data));
    }
    catch(err){
        console.error("Local save error:", err);
    }
}

async function syncToGoogle(){
    if(!rows || headers.length === 0){
        alert("No data to sync");
        return;
    }

    try{
        updateStats("⏳ Syncing to Google Sheets...");

        let data = [];
        data.push(headers);
        rows.forEach(row => {
            let arr = [];
            headers.forEach(h => {
                arr.push(row[h] !== undefined && row[h] !== null ? row[h] : "");
            });
            data.push(arr);
        });

        // Dùng no-cors + text/plain để tránh CORS preflight với Google Apps Script
        await fetch(GOOGLE_APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(data)
        });

        // no-cors không trả về response body, nếu không throw = thành công
        isOnline = true;
        lastSyncTime = new Date().toLocaleTimeString();
        setConnectionStatus();
        saveLocalData();
        updateStats("✅ Synced to Google Sheets at " + lastSyncTime + " | Records: " + rows.length);

    }
    catch(err){
        console.error("Sync error:", err);
        isOnline = false;
        setConnectionStatus();
        saveLocalData();
        updateStats("⚠️ Sync failed - saved locally");
        alert("Sync failed: " + err.message);
    }
}

function buildFieldList(){
    const field = document.getElementById("field");
    field.innerHTML = '<option value="ALL">All Fields</option>';
    
    headers.forEach(h => {
        field.innerHTML += `<option value="${h}">${h}</option>`;
    });
}

function updateStats(msg){
    document.getElementById("stats").innerText = msg;
}

function searchData(){
    const keyword = document.getElementById("keyword").value.toLowerCase().trim();
    const field = document.getElementById("field").value;
    
    if(keyword === ""){
        render(rows);
        return;
    }
    
    const result = rows.filter(row => {
        if(field === "ALL"){
            return Object.values(row).some(v => 
                String(v).toLowerCase().includes(keyword)
            );
        }
        return String(row[field] || "").toLowerCase().includes(keyword);
    });
    
    currentKeyword = keyword;
    render(result);
}

function getStickyClass(col){
    const c = String(col).trim().toUpperCase();
    
    if(c === "VTCODE") return "sticky1";
    if(c === "SL") return "sticky2";
    if(c === "P/N2" || c === "PN2") return "sticky3";
    if(c === "P/N3" || c === "PN3") return "sticky4";
    if(c === "NOTE") return "sticky5";
    
    return "";
}

function getWidthClass(col){
    const c = String(col).trim().toUpperCase();
    
    if(c === "DESCRIPTION") return "desc";
    if(c === "VTCODE") return "vt";
    
    return "small";
}

function render(data){
    const thead = document.querySelector("#tbl thead");
    const tbody = document.querySelector("#tbl tbody");
    
    thead.innerHTML = "";
    tbody.innerHTML = "";
    
    if(data.length === 0){
        updateStats(`Records: 0 / ${rows.length}`);
        return;
    }
    
    // Build header
    let headHTML = "<tr><th style='min-width:40px'>✓</th>";
    headers.forEach(h => {
        headHTML += `<th class="${getStickyClass(h)}">${h}</th>`;
    });
    headHTML += "</tr>";
    
    thead.innerHTML = headHTML;
    
    // Build rows
    data.forEach((row, rowIndex) => {
        const tr = document.createElement("tr");
        
        // Checkbox column
        tr.innerHTML = `<td style='min-width:40px'><input type="checkbox" class="rowCheck"></td>`;
        
        // Data columns
        headers.forEach(col => {
            const td = document.createElement("td");
            td.className = getStickyClass(col);
            
            let value = row[col];
            if(value === undefined || value === null){
                value = "";
            }
            
            value = String(value).replaceAll('"', "&quot;");
            const rawValue = value;
            
            // Check for duplicates
            if(duplicateMap[rawValue] > 1){
                td.classList.add("duplicate-cell");
            }
            
            td.innerHTML = `
                <input 
                    class="cellInput ${getWidthClass(col)}"
                    value="${value}"
                    data-row="${rowIndex}"
                    data-col="${col}"
                >
            `;
            
            const input = td.querySelector("input");
            
            input.addEventListener("focus", function(){
                isEditing = true;
            });
            
            input.addEventListener("input", function(){
                row[col] = this.value;
                tr.classList.add("modified");
            });

            input.addEventListener("change", function(){
                row[col] = this.value;
                tr.classList.add("modified");
                saveLocalData();
            });
            
            input.addEventListener("blur", function(){
                isEditing = false;
            });
            
            tr.appendChild(td);
        });
        
        tbody.appendChild(tr);
    });
    
    updateStats(`Records: ${data.length} / ${rows.length} ${lastSyncTime ? '| Last sync: ' + lastSyncTime : ''}`);
}

function addRow(){
    let obj = {};
    headers.forEach(h => {
        obj[h] = "";
    });
    
    rows.unshift(obj);
    saveLocalData();
    render(rows);
}

function deleteSelected(){
    const checkboxes = document.querySelectorAll(".rowCheck");
    let selected = [];
    
    checkboxes.forEach((checkbox, index) => {
        if(checkbox.checked){
            selected.push(index);
        }
    });
    
    if(selected.length === 0){
        alert("Please select rows to delete");
        return;
    }
    
    if(!confirm(`Delete ${selected.length} row(s)?`)){
        return;
    }
    
    // Save for undo
    undoStack.push(JSON.parse(JSON.stringify(rows)));
    if(undoStack.length > 20){
        undoStack.shift();
    }
    
    rows = rows.filter((r, index) => !selected.includes(index));
    saveLocalData();
    render(rows);
}

function saveExcel(){
    if(rows.length === 0){
        alert("No data to export");
        return;
    }
    
    let data = [];
    data.push(headers);
    
    rows.forEach(row => {
        let arr = [];
        headers.forEach(h => {
            arr.push(row[h] || "");
        });
        data.push(arr);
    });
    
    let ws = XLSX.utils.aoa_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Database");
    
    let now = new Date();
    let fileName = "PartDatabase_" + now.toISOString().substring(0, 10) + ".xlsx";
    
    XLSX.writeFile(wb, fileName);
    updateStats("Excel file downloaded");
}

function undo(){
    if(undoStack.length === 0){
        alert("No undo history");
        return;
    }
    
    rows = undoStack.pop();
    saveLocalData();
    render(rows);
}

function toggleDarkMode(){
    darkMode = !darkMode;
    
    if(darkMode){
        document.body.classList.add("dark-mode");
    }
    else{
        document.body.classList.remove("dark-mode");
    }
    
    localStorage.setItem("darkMode", darkMode);
}

function duplicateCheck(){
    duplicateMap = {};
    
    rows.forEach(r => {
        let vt = String(r["VTCODE"] || "").trim();
        let pn2 = String(r["P/N2"] || r["PN2"] || "").trim();
        let pn3 = String(r["P/N3"] || r["PN3"] || "").trim();
        
        [vt, pn2, pn3].forEach(key => {
            if(key === "") return;
            duplicateMap[key] = (duplicateMap[key] || 0) + 1;
        });
    });
}

function sortAZ(){
    const field = document.getElementById("field").value;
    
    if(field === "ALL"){
        alert("Select a specific field to sort");
        return;
    }
    
    rows.sort((a, b) => 
        String(a[field] || "").localeCompare(String(b[field] || ""))
    );
    
    saveLocalData();
    render(rows);
}

function sortZA(){
    const field = document.getElementById("field").value;
    
    if(field === "ALL"){
        alert("Select a specific field to sort");
        return;
    }
    
    rows.sort((a, b) => 
        String(b[field] || "").localeCompare(String(a[field] || ""))
    );
    
    saveLocalData();
    render(rows);
}

function importExcel(){
    const file = document.getElementById("excelFile").files[0];
    
    if(!file){
        alert("Please select a file");
        return;
    }
    
    const reader = new FileReader();
    
    reader.onload = function(e){
        try{
            const wb = XLSX.read(e.target.result, {type: "binary"});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const arr = XLSX.utils.sheet_to_json(ws, {header: 1});
            
            if(arr.length < 1){
                alert("File is empty");
                return;
            }
            
            // Save current state for undo
            undoStack.push(JSON.parse(JSON.stringify(rows)));
            if(undoStack.length > 20){
                undoStack.shift();
            }
            
            headers = arr[0];
            rows = [];
            
            for(let i = 1; i < arr.length; i++){
                let obj = {};
                headers.forEach((h, index) => {
                    obj[h] = arr[i][index] || "";
                });
                rows.push(obj);
            }
            
            saveLocalData();
            buildFieldList();
            duplicateCheck();
            render(rows);
            updateStats(`Imported ${rows.length} records - Remember to sync to Google Sheets!`);
        }
        catch(err){
            alert("Import error: " + err);
        }
    };
    
    reader.readAsBinaryString(file);
}


function levenshtein(a,b){
const m=[];
for(let i=0;i<=b.length;i++){m[i]=[i]}
for(let j=0;j<=a.length;j++){m[0][j]=j}
for(let i=1;i<=b.length;i++){
 for(let j=1;j<=a.length;j++){
  m[i][j]=b.charAt(i-1)==a.charAt(j-1)?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1)
 }
}
return m[b.length][a.length];
}


function barcodeSearch(){
    let code=document.getElementById("barcodeInput").value.toUpperCase().trim();
    if(code===""){ render(rows); return; }

    // Search priority:
    // MFG1_PART# -> VTCODE -> P/N2 -> P/N3
    const fields=["MFG1_PART#","VTCODE","P/N2","PN2","P/N3","PN3"];

    // Exact substring search
    for(let field of fields){
        let result = rows.filter(r=>{
            let value=String(r[field]||"").toUpperCase().trim();
            return value!=="" && code.includes(value);
        });

        if(result.length>0){
            render(result);
            updateStats("Found by "+field+" : "+result.length+" record(s)");
            return;
        }
    }

    // Fuzzy search
    let candidates=[];

    rows.forEach(r=>{
        fields.forEach(field=>{
            let value=String(r[field]||"").toUpperCase().trim();
            if(value==="") return;

            let best=999;
            for(let i=0;i<=Math.max(0,code.length-value.length);i++){
                let sub=code.substring(i,i+value.length);
                let d=levenshtein(sub,value);
                if(d<best) best=d;
            }

            candidates.push({distance:best,row:r});
        });
    });

    candidates.sort((a,b)=>a.distance-b.distance);
    let result=candidates.slice(0,10).map(x=>x.row);

    render(result);
    updateStats("No exact match. Showing nearest results");
}


/* ═══════════════════════════════════════
   BARCODE SCANNER
═══════════════════════════════════════ */

let html5QrCode = null;
let scannerRunning = false;

function openScanner(){
    const modal = document.getElementById("scannerModal");
    modal.classList.add("active");
    document.getElementById("scannerStatus").textContent = "Đang khởi động camera...";
    startScanner();
}

async function startScanner(){
    try{
        // Dừng instance cũ nếu có
        if(html5QrCode && scannerRunning){
            await html5QrCode.stop();
            html5QrCode.clear();
        }

        html5QrCode = new Html5Qrcode("reader");

        // Các định dạng barcode cần đọc
        const formats = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.DATA_MATRIX,
        ];

        const config = {
            fps: 15,
            qrbox: function(viewfinderWidth, viewfinderHeight){
                // Khung quét: 80% chiều rộng, tối đa 300px
                const size = Math.min(
                    Math.floor(viewfinderWidth * 0.8),
                    300
                );
                return { width: size, height: Math.floor(size * 0.5) };
            },
            aspectRatio: 1.5,
            formatsToSupport: formats,
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true  // Dùng native API nếu có (Chrome Android nhanh hơn)
            }
        };

        await html5QrCode.start(
            { facingMode: "environment" }, // Camera sau
            config,
            onScanSuccess,
            onScanError
        );

        scannerRunning = true;
        document.getElementById("scannerStatus").textContent = "🟢 Camera sẵn sàng — đưa barcode vào khung";

    }
    catch(err){
        console.error("Camera error:", err);

        let msg = "Không thể mở camera.";

        if(err.toString().includes("Permission")){
            msg = "❌ Chưa cấp quyền camera. Vào Settings > Safari/Chrome > Camera để cho phép.";
        }
        else if(err.toString().includes("NotFound")){
            msg = "❌ Không tìm thấy camera.";
        }
        else if(err.toString().includes("https") || location.protocol !== "https:"){
            msg = "❌ Cần HTTPS để dùng camera. Hãy mở file qua HTTPS hoặc localhost.";
        }

        document.getElementById("scannerStatus").textContent = msg;
    }
}

function onScanSuccess(decodedText, decodedResult){
    console.log("Scanned:", decodedText);

    // Điền vào ô barcode search
    const input = document.getElementById("barcodeInput");
    input.value = decodedText;

    // Flash xanh báo thành công
    document.getElementById("scannerStatus").textContent = "✅ Đọc được: " + decodedText;
    document.getElementById("scannerBox").style.border = "3px solid #28a745";

    // Rung (nếu điện thoại hỗ trợ)
    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    // Đóng scanner sau 600ms
    setTimeout(function(){
        closeScanner();
        barcodeSearch();
    }, 600);
}

function onScanError(errorMessage){
    // Bỏ qua lỗi scan liên tục (normal khi chưa có barcode trong khung)
}

async function closeScanner(){
    const modal = document.getElementById("scannerModal");
    modal.classList.remove("active");
    document.getElementById("scannerBox").style.border = "none";

    if(html5QrCode && scannerRunning){
        try{
            await html5QrCode.stop();
            html5QrCode.clear();
        }
        catch(e){
            console.warn("Stop scanner:", e);
        }
        html5QrCode = null;
        scannerRunning = false;
    }
}

// Đóng modal khi bấm ra ngoài
document.getElementById("scannerModal").addEventListener("click", function(e){
    if(e.target === this){
        closeScanner();
    }
});


if(localStorage.getItem("darkMode") === "true"){
    toggleDarkMode();
}



</script>

</body>

</html>
